# Template configuration for local project E2E tests
# Format: template_name|build_command|description
#
# Available templates:
#   swing, javafx, picocli, fxgl, quarkus-rest, quarkus-mcp-server,
#   spring-boot-rest, spring-boot-mcp-server, kotlin-multiplatform

# Simple templates for quick E2E testing
swing|mvn clean package -q|Basic Swing GUI application
picocli|mvn clean package -q|Picocli CLI application

# Uncomment to test more templates (takes longer)
javafx|mvn clean package -q|JavaFX GUI application
# quarkus-rest|mvn clean package -q|Quarkus REST server
# spring-boot-rest|mvn clean package -q|Spring Boot REST server
